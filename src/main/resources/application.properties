spring.application.name=ProjetoCaoGuiaBackend

# Docker Compose - Gerenciamento automático (inicia/para container)
spring.docker.compose.lifecycle-management=start-and-stop
spring.docker.compose.start.command=up
spring.docker.compose.stop.command=stop
spring.docker.compose.stop.timeout=30s

# SQL Server Database (detectado automaticamente do compose.yaml)
spring.datasource.url=jdbc:sqlserver://localhost:1433;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=CaoGuia@2026
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=caoguia-secret-key-projeto-ifgoiano-urt-2026-muito-segura
jwt.expiration=86400000

# Server
server.port=8080

# Desabilitar H2 Console em produção
spring.h2.console.enabled=false

